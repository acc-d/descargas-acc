    body {

      background-position: center 30%;

      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {

      color: white;
      padding: 28px;
    }

    .header h1 {

      font-size: 28px;
    }

    .header p {
      margin: 0;
      color: #d1d5db;
      font-size: 15px;
    }

    .content {
      padding: 28px;
    }

    .login-box label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }

    .login-box input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      margin-top: 8px;
    }

    .login-box button,
    .logout-btn {
      margin-top: 18px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-box button:hover,
    .logout-btn:hover {
      background: #1d4ed8;
    }

    .error {
      margin-top: 12px;
      color: #dc2626;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .welcome {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .welcome-info h2 {
      margin: 0;
      font-size: 24px;
    }

    .session-name {
      margin: 6px 0 0;
      font-size: 15px;
      font-weight: 600;
      color: #1f2937;
    }

    .event-name {
      margin: 4px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .file-list {
      display: grid;
      gap: 14px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
    }

    .file-info h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .file-info p {
      margin: 0;
      font-size: 14px;
      color: #6b7280;
    }

    .countdown {
      margin-top: 8px !important;
      font-size: 12px !important;
      color: #2563eb !important;
      font-weight: 600;
    }

    .download-btn {
      text-decoration: none;
      background: #2563eb;
      color: #fff;
      padding: 11px 16px;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
      display: inline-block;
    }

    .download-btn:hover {
      background: #1d4ed8;
    }

    .download-btn.disabled {
      background: #9ca3af;
      cursor: not-allowed;
      pointer-events: none;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 700px) {
      .file-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .download-btn {
        width: 100%;
        text-align: center;
      }
    }

    function getSpainTime() {
      const now = new Date();
      return new Date(now.toLocaleString("en-US", { timeZone: "Europe/Madrid" }));
    }

    function isVisible(file) {
      const now = getSpainTime();

      if (file.visibleFrom && now < new Date(file.visibleFrom)) {
        return false;
      }

      if (file.visibleUntil && now > new Date(file.visibleUntil)) {
        return false;
      }

      return true;
    }

    function getCountdownText(file) {
      const now = getSpainTime();

      if (file.visibleFrom && now < new Date(file.visibleFrom)) {
        const diff = new Date(file.visibleFrom) - now;

        const totalSeconds = Math.ceil(diff / 1000);

        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        if (days > 0) {
          return `Disponible en ${days}d ${hours}h`;
        }

        if (hours > 0) {
          return `Disponible en ${hours}h ${minutes}m`;
        }

        if (minutes > 0) {
          return `Disponible en ${minutes}m ${seconds}s`;
        }

        return `Disponible en ${seconds}s`;
      }

      return "";
    }

    async function registrarAcceso(nombre, password, sesion) {
      if (!APPS_SCRIPT_URL) {
        console.warn("Falta configurar APPS_SCRIPT_URL");
        return;
      }

      const payload = {
        fechaISO: new Date().toISOString(),
        nombre: nombre,
        password: password,
        sesion: sesion,
        userAgent: navigator.userAgent
      };

      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });
    }

    function renderFiles(client) {
      const fileList = document.getElementById("fileList");
      fileList.innerHTML = "";

      const filesToShow = client.files.filter(file => {
        const now = getSpainTime();

        if (file.visibleUntil && now > new Date(file.visibleUntil)) {
          return false;
        }

        return true;
      });

      if (filesToShow.length === 0) {
        fileList.innerHTML = `
          <div class="file-item">
            <div class="file-info">
              <h3>No hay archivos disponibles ahora mismo</h3>
              <p>Vuelve a intentarlo dentro del horario habilitado para tu sesión.</p>
            </div>
          </div>
        `;
        return;
      }

      filesToShow.forEach(file => {
        const item = document.createElement("div");
        item.className = "file-item";

        const visible = isVisible(file);
        const countdownText = getCountdownText(file);

        let actionHTML = "";

        if (visible) {
          actionHTML = file.type === "link"
            ? `<a class="download-btn" href="${file.path}" target="_blank" rel="noopener noreferrer">${file.button}</a>`
            : `<a class="download-btn" href="${file.path}" download>${file.button}</a>`;
        } else {
          actionHTML = `<span class="download-btn disabled">Próximamente</span>`;
        }

        item.innerHTML = `
          <div class="file-info">
            <h3>${file.title}</h3>
            <p>${file.description}</p>
            ${countdownText ? `<p class="countdown">${countdownText}</p>` : ""}
          </div>
          ${actionHTML}
        `;

        fileList.appendChild(item);
      });
    }

    async function login() {
      const nameInput = document.getElementById("name");
      const passwordInput = document.getElementById("password");
      const errorBox = document.getElementById("error");

      const nombre = nameInput.value.trim();
      const password = passwordInput.value.trim();
      const client = clients[password];

      if (!nombre) {
        errorBox.textContent = "Escribe tu nombre y apellido.";
        return;
      }

      if (!client) {
        errorBox.textContent = "Contraseña incorrecta.";
        return;
      }

      errorBox.textContent = "";

      try {
        await registrarAcceso(nombre, password, client.name);
      } catch (error) {
        console.error("Error al registrar el acceso:", error);
      }

      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      document.getElementById("clientName").textContent = "Bienvenido, " + nombre;
      document.getElementById("sessionName").textContent = "Sesión: " + client.name;
      document.getElementById("eventName").textContent = "Prueba: " + (client.eventName || "");

      renderFiles(client);
      window.currentClient = client;
    }

    function logout() {
      document.getElementById("name").value = "";
      document.getElementById("password").value = "";
      document.getElementById("panel").classList.add("hidden");
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("fileList").innerHTML = "";
      document.getElementById("clientName").textContent = "";
      document.getElementById("sessionName").textContent = "";
      document.getElementById("eventName").textContent = "";
      document.getElementById("error").textContent = "";
      window.currentClient = null;
    }

    setInterval(() => {
      const panelVisible = !document.getElementById("panel").classList.contains("hidden");
      if (panelVisible && window.currentClient) {
        renderFiles(window.currentClient);
      }
    }, 1000);
